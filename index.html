<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Supabase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .hidden-screen { display: none; }
        .loader { border-top-color: #6366f1; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 to-indigo-900 min-h-screen flex items-center justify-center p-4 font-sans text-slate-800">

    <div id="loginScreen" class="glass p-8 rounded-2xl shadow-2xl w-full max-w-md border border-white/20">
        <h2 class="text-3xl font-extrabold text-center text-indigo-600 mb-2">Welcome Back</h2>
        <p class="text-center text-slate-500 mb-8 text-sm">Log in to manage your tasks</p>
        
        <div class="space-y-4">
            <input type="email" id="loginEmail" placeholder="Email Address" class="w-full p-4 border rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none transition">
            <input type="password" id="loginPass" placeholder="Password" class="w-full p-4 border rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none transition">
            <button onclick="handleLogin()" id="loginBtn" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold hover:bg-indigo-700 transform active:scale-95 transition">Login</button>
        </div>
        
        <p class="text-center mt-6 text-sm text-slate-600">
            Don't have an account? <button onclick="switchScreen('signup')" class="text-indigo-600 font-bold hover:underline">Create Account</button>
        </p>
    </div>

    <div id="signupScreen" class="glass p-8 rounded-2xl shadow-2xl w-full max-w-md border border-white/20 hidden-screen">
        <h2 class="text-3xl font-extrabold text-center text-emerald-600 mb-2">Join TaskFlow</h2>
        <p class="text-center text-slate-500 mb-8 text-sm">Free forever task management</p>
        
        <div class="space-y-4">
            <input type="email" id="signupEmail" placeholder="Email Address" class="w-full p-4 border rounded-xl focus:ring-2 focus:ring-emerald-400 outline-none transition">
            <input type="password" id="signupPass" placeholder="Create Password" class="w-full p-4 border rounded-xl focus:ring-2 focus:ring-emerald-400 outline-none transition">
            <button onclick="handleSignUp()" id="signupBtn" class="w-full bg-emerald-500 text-white p-4 rounded-xl font-bold hover:bg-emerald-600 transform active:scale-95 transition">Sign Up</button>
        </div>
        
        <p class="text-center mt-6 text-sm text-slate-600">
            Already a member? <button onclick="switchScreen('login')" class="text-indigo-600 font-bold hover:underline">Login here</button>
        </p>
    </div>

    <div id="appScreen" class="glass p-8 rounded-2xl shadow-2xl w-full max-w-2xl border border-white/20 hidden-screen">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-2xl font-bold text-slate-900">My Dashboard</h2>
                <p id="userDisplay" class="text-xs text-indigo-500 font-medium"></p>
            </div>
            <button onclick="handleLogout()" class="px-4 py-2 bg-slate-200 text-slate-700 rounded-lg text-sm font-bold hover:bg-red-100 hover:text-red-600 transition">Logout</button>
        </div>

        <div class="flex gap-3 mb-8">
            <input type="text" id="taskInput" placeholder="Add a new task..." class="flex-1 p-4 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-400">
            <button onclick="addTask()" class="bg-indigo-600 text-white px-8 rounded-xl font-bold hover:bg-indigo-700">+</button>
        </div>

        <ul id="taskList" class="space-y-3 max-h-[400px] overflow-y-auto pr-2">
            </ul>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SB_URL = 'https://ktfiockexdvjuduhqixh.supabase.co';
        const SB_KEY = 'sb_publishable_d28Z4z6qdCvdf4UT86aMiQ_EOYdg-42';
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        // --- AUTH LOGIC ---
        async function handleSignUp() {
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPass').value;
            if(!email || !password) return alert("Fill all fields");

            const { error } = await supabase.auth.signUp({ email, password });
            if (error) alert(error.message);
            else alert("Check your email for confirmation!");
        }

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPass').value;
            
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) alert(error.message);
            else {
                switchScreen('app');
                initApp();
            }
        }

        async function handleLogout() {
            await supabase.auth.signOut();
            location.reload();
        }

        // --- DATABASE LOGIC ---
        async function initApp() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                document.getElementById('userDisplay').innerText = user.email;
                fetchTasks(user.id);
            }
        }

        async function fetchTasks(userId) {
            const { data, error } = await supabase.from('todos')
                .select('*')
                .eq('user_id', userId)
                .order('created_at', { ascending: false });
            
            if (!error) renderTasks(data);
        }

        async function addTask() {
            const input = document.getElementById('taskInput');
            const { data: { user } } = await supabase.auth.getUser();
            
            if (input.value.trim()) {
                const { error } = await supabase.from('todos').insert([
                    { task: input.value, user_id: user.id }
                ]);
                if (!error) {
                    input.value = '';
                    fetchTasks(user.id);
                }
            }
        }

        async function deleteTask(id) {
            const { data: { user } } = await supabase.auth.getUser();
            await supabase.from('todos').delete().eq('id', id);
            fetchTasks(user.id);
        }

        // --- UI HELPERS ---
        function switchScreen(screen) {
            document.getElementById('loginScreen').classList.add('hidden-screen');
            document.getElementById('signupScreen').classList.add('hidden-screen');
            document.getElementById('appScreen').classList.add('hidden-screen');
            
            document.getElementById(screen + 'Screen').classList.remove('hidden-screen');
        }

        function renderTasks(todos) {
            const list = document.getElementById('taskList');
            list.innerHTML = todos.length ? '' : '<p class="text-center text-slate-400 py-10">No tasks yet. Add one above!</p>';
            todos.forEach(t => {
                const li = document.createElement('li');
                li.className = "flex justify-between items-center bg-white p-4 rounded-xl border border-slate-100 shadow-sm hover:shadow-md transition";
                li.innerHTML = `
                    <span class="text-slate-700 font-medium">${t.task}</span>
                    <button onclick="deleteTask('${t.id}')" class="text-slate-300 hover:text-red-500 transition">✕</button>
                `;
                list.appendChild(li);
            });
        }

        // Check session on load
        window.onload = async () => {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                switchScreen('app');
                initApp();
            }
        };
    </script>
</body>
</html>
