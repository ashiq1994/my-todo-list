<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Welcome</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border-t-4 border-blue-600">
        <h1 class="text-3xl font-bold mb-2 text-center text-gray-800">TaskFlow</h1>
        <p class="text-center text-gray-500 mb-8">Organize your life in seconds</p>

        <div id="auth-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                <input type="text" id="full-name" placeholder="Mohammed Ashiq" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                <input type="tel" id="phone" placeholder="+968 XXXX XXXX" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
            </div>

            <hr class="my-4">

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <input type="email" id="email" placeholder="name@example.com" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" placeholder="Min 6 characters" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
            </div>

            <div class="pt-4 flex flex-col gap-3">
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-semibold py-3 rounded-lg hover:bg-blue-700 transition">Login</button>
                <button onclick="handleSignUp()" class="w-full bg-white text-blue-600 border border-blue-600 font-semibold py-3 rounded-lg hover:bg-blue-50 transition">Create Account</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://ktfiockexdvjuduhqixh.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0ZmlvY2tleGR2anVkdWhxaXhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNjExMjUsImV4cCI6MjA4OTkzNzEyNX0.w_2YABA_lVGrtFukbcpPsZCyeRCGr8iO0U8gjTRbXB8';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function handleSignUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const fullName = document.getElementById('full-name').value;
            const phone = document.getElementById('phone').value;

            if (!email || !password || !fullName) {
                return alert("Please fill in Name, Email, and Password.");
            }

            // Storing detailed info in 'options.data'
            const { data, error } = await supabaseClient.auth.signUp({
                email,
                password,
                options: {
                    data: {
                        display_name: fullName,
                        phone_number: phone
                    }
                }
            });

            if (error) alert(error.message);
            else alert("Account created for " + fullName + "! Now you can Login.");
        }

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            
            if (error) alert(error.message);
            else window.location.href = "dashboard.html";
        }
    </script>
</body>
</html>
