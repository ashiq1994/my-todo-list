<script>
    // --- 1. INITIALIZE SUPABASE ---
    // Using your specific Project URL and the cleaned Anon Key (no backslashes)
    const SB_URL = 'https://ktfiockexdvjuduhqixh.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0ZmlvY2tleGR2anVkdWhxaXhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNjExMjUsImV4cCI6MjA4OTkzNzEyNX0.w_2YABA_lVGrtFukbcpPsZCyeRCGr8iO0U8gjTRbXB8';
    
    // We use 'supabaseClient' to avoid conflict with the global 'supabase' library object
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    // --- 2. SCREEN SWITCHER ---
    function switchScreen(screenId) {
        const authScreen = document.getElementById('auth-screen');
        const todoScreen = document.getElementById('todo-screen');
        
        if (screenId === 'todo-screen') {
            authScreen.classList.add('hidden');
            todoScreen.classList.remove('hidden');
        } else {
            authScreen.classList.remove('hidden');
            todoScreen.classList.add('hidden');
        }
    }

    // --- 3. AUTHENTICATION FUNCTIONS ---
    async function handleSignUp() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        if (!email || !password) return alert("Please enter both email and password.");

        const { data, error } = await supabaseClient.auth.signUp({
            email: email,
            password: password
        });

        if (error) {
            alert("Error: " + error.message);
        } else {
            alert("Success! You can now log in.");
        }
    }

    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        const { data, error } = await supabaseClient.auth.signInWithPassword({
            email: email,
            password: password
        });

        if (error) {
            alert("Login Failed: " + error.message);
        } else {
            switchScreen('todo-screen');
            loadTodos();
        }
    }

    async function handleLogout() {
        await supabaseClient.auth.signOut();
        switchScreen('auth-screen');
    }

    // --- 4. TODO FUNCTIONS ---
    async function loadTodos() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) return;

        const { data: todos, error } = await supabaseClient
            .from('todos')
            .select('*')
            .eq('user_id', user.id)
            .order('created_at', { ascending: false });

        if (error) {
            console.error("Error loading todos:", error.message);
        } else {
            renderTodos(todos);
        }
    }

    async function addTodo() {
        const input = document.getElementById('todo-input');
        const { data: { user } } = await supabaseClient.auth.getUser();

        if (!input.value.trim() || !user) return;

        const { error } = await supabaseClient
            .from('todos')
            .insert([{ task: input.value, user_id: user.id }]);

        if (error) {
            alert("Error saving task: " + error.message);
        } else {
            input.value = "";
            loadTodos();
        }
    }

    function renderTodos(todos) {
        const list = document.getElementById('todo-list');
        list.innerHTML = "";
        
        todos.forEach(todo => {
            const li = document.createElement('li');
            li.className = "flex justify-between items-center p-3 bg-gray-50 rounded border mb-2 shadow-sm";
            li.innerHTML = `
                <span class="text-gray-700">${todo.task}</span>
                <button onclick="deleteTodo('${todo.id}')" class="text-red-400 hover:text-red-600 transition">
                    ✕
                </button>
            `;
            list.appendChild(li);
        });
    }

    async function deleteTodo(id) {
        const { error } = await supabaseClient
            .from('todos')
            .delete()
            .eq('id', id);

        if (error) {
            alert("Error deleting task: " + error.message);
        } else {
            loadTodos();
        }
    }
</script>
