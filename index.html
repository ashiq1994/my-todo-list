<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 md:p-10">

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-5xl">
        
        <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-200 flex flex-col justify-center">
            <div class="mb-8">
                <h1 class="text-3xl font-bold text-slate-800">Welcome Back</h1>
                <p class="text-slate-500">Please enter your details to sign in.</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
                    <input type="email" id="login-email" placeholder="email@example.com" 
                        class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" 
                        class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
                <button onclick="handleLogin()" 
                    class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-100 transition active:scale-95 mt-4">
                    Sign In
                </button>
            </div>
        </div>

        <div class="bg-blue-600 p-8 rounded-3xl shadow-xl text-white">
            <div class="mb-8">
                <h2 class="text-3xl font-bold">New Here?</h2>
                <p class="text-blue-100">Create an account to manage your tasks.</p>
            </div>

            <div class="space-y-4 text-slate-800">
                <div>
                    <label class="block text-sm font-medium text-blue-50 mb-1">Full Name</label>
                    <input type="text" id="reg-name" placeholder="Mohammed Ashiq" 
                        class="w-full p-3 bg-white rounded-xl focus:ring-2 focus:ring-blue-300 outline-none transition border-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-blue-50 mb-1">Date of Birth</label>
                    <input type="date" id="reg-dob" 
                        class="w-full p-3 bg-white rounded-xl focus:ring-2 focus:ring-blue-300 outline-none transition border-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-blue-50 mb-1">Email ID</label>
                    <input type="email" id="reg-email" placeholder="name@example.com" 
                        class="w-full p-3 bg-white rounded-xl focus:ring-2 focus:ring-blue-300 outline-none transition border-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-blue-50 mb-1">Password</label>
                    <input type="password" id="reg-password" placeholder="Min. 6 chars" 
                        class="w-full p-3 bg-white rounded-xl focus:ring-2 focus:ring-blue-300 outline-none transition border-none">
                </div>
                <button onclick="handleSignUp()" 
                    class="w-full bg-white text-blue-600 font-bold py-4 rounded-xl hover:bg-blue-50 transition active:scale-95 mt-4 shadow-md">
                    Register Now
                </button>
            </div>
        </div>

    </div>

    <script>
        const SB_URL = 'https://ktfiockexdvjuduhqixh.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0ZmlvY2tleGR2anVkdWhxaXhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNjExMjUsImV4cCI6MjA4OTkzNzEyNX0.w_2YABA_lVGrtFukbcpPsZCyeRCGr8iO0U8gjTRbXB8';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        // --- Signup Function ---
        async function handleSignUp() {
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const fullName = document.getElementById('reg-name').value;
            const dob = document.getElementById('reg-dob').value;

            if (!email || !password || !fullName || !dob) return alert("All fields are required!");

            const { data, error } = await supabaseClient.auth.signUp({
                email, password, options: { data: { full_name: fullName, dob: dob } }
            });

            if (error) alert(error.message);
            else alert("Account created! You can now use the Sign In box.");
        }

        // --- Login Function ---
        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            if (!email || !password) return alert("Enter email and password!");

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            
            if (error) alert(error.message);
            else window.location.href = "dashboard.html";
        }
    </script>
</body>
</html>
