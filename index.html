<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border-t-8 border-blue-600">
        <h1 class="text-3xl font-extrabold mb-1 text-center text-gray-800">Join TaskFlow</h1>
        <p class="text-center text-gray-500 mb-8">Set up your profile to start tracking tasks</p>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Full Name</label>
                <input type="text" id="full-name" placeholder="John Doe" 
                    class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Date of Birth</label>
                <input type="date" id="dob" 
                    class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>

            <hr class="border-gray-100 my-4">

            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Email Address</label>
                <input type="email" id="email" placeholder="email@example.com" 
                    class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Password</label>
                <input type="password" id="password" placeholder="Min. 6 characters" 
                    class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>

            <div class="pt-6 flex flex-col gap-3">
                <button onclick="handleSignUp()" 
                    class="w-full bg-blue-600 text-white font-bold py-3.5 rounded-xl hover:bg-blue-700 active:scale-95 transition shadow-lg">
                    Create Account
                </button>
                <button onclick="handleLogin()" 
                    class="w-full bg-gray-50 text-blue-600 font-bold py-3.5 rounded-xl border border-blue-100 hover:bg-blue-50 transition">
                    Login Existing Account
                </button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://ktfiockexdvjuduhqixh.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0ZmlvY2tleGR2anVkdWhxaXhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNjExMjUsImV4cCI6MjA4OTkzNzEyNX0.w_2YABA_lVGrtFukbcpPsZCyeRCGr8iO0U8gjTRbXB8';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function handleSignUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const fullName = document.getElementById('full-name').value;
            const dob = document.getElementById('dob').value;

            if (!email || !password || !fullName || !dob) {
                return alert("Please fill in all fields (Name, DOB, Email, and Password).");
            }

            // Save details into User Metadata
            const { data, error } = await supabaseClient.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        full_name: fullName,
                        date_of_birth: dob
                    }
                }
            });

            if (error) {
                alert("Signup Error: " + error.message);
            } else {
                alert("Account created for " + fullName + "! Please log in.");
            }
        }

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password
            });
            
            if (error) {
                alert("Login Error: " + error.message);
            } else {
                // Redirect to dashboard on success
                window.location.href = "dashboard.html";
            }
        }
    </script>
</body>
</html>
