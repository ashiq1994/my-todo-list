<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <style>
        .completed-task { text-decoration: line-through; opacity: 0.5; filter: grayscale(1); }
        .fc-event { cursor: pointer; border: none !important; padding: 4px 8px; font-weight: 700; border-radius: 8px; font-size: 0.85rem; }
        .category-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        input[type="date"], input[type="time"], select { color-scheme: light; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen font-sans text-slate-900">

    <nav class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black text-xl shadow-lg">T</div>
            <h1 class="text-xl font-bold tracking-tight text-slate-800">TaskFlow</h1>
        </div>
        <button onclick="handleLogout()" class="bg-slate-100 text-slate-600 px-4 py-2 rounded-xl text-sm font-bold hover:bg-red-50 transition-all">Logout</button>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-4 space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <h2 class="text-[10px] font-black uppercase text-slate-400 mb-4 tracking-widest italic">Flag Management</h2>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="new-cat-name" placeholder="Flag Name..." class="flex-1 p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none">
                    <input type="color" id="new-cat-color" value="#2563eb" class="w-12 h-12 p-1 bg-white border border-slate-200 rounded-xl cursor-pointer">
                    <button onclick="createCategory()" class="bg-slate-800 text-white px-5 rounded-xl font-bold">+</button>
                </div>
                <div id="category-tags" class="flex flex-wrap gap-2"></div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <h2 class="text-[10px] font-black uppercase text-slate-400 mb-4 tracking-widest italic">Schedule Task</h2>
                <div class="space-y-4">
                    <input type="text" id="todo-input" placeholder="Task description..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    <select id="category-select" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm outline-none cursor-pointer"></select>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[9px] font-bold text-slate-400 ml-1">START DATE</label>
                            <input type="date" id="date-from" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-xl text-xs">
                        </div>
                        <div>
                            <label class="text-[9px] font-bold text-slate-400 ml-1">END DATE</label>
                            <input type="date" id="date-to" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-xl text-xs">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[9px] font-bold text-slate-400 ml-1">START TIME</label>
                            <input type="time" id="start-time" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-xl text-xs">
                        </div>
                        <div>
                            <label class="text-[9px] font-bold text-slate-400 ml-1">END TIME</label>
                            <input type="time" id="end-time" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-xl text-xs">
                        </div>
                    </div>

                    <button onclick="addTodo()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-xl shadow-blue-100 hover:bg-blue-700 transition active:scale-95">Create Schedule</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold text-slate-800 italic text-sm">Task List</h2>
                    <input type="text" id="search-bar" onkeyup="filterTasks()" placeholder="Search..." class="p-2 text-xs border border-slate-200 rounded-xl w-1/2 outline-none">
                </div>
                <ul id="todo-list" class="space-y-3 max-h-[350px] overflow-y-auto pr-2"></ul>
            </div>
        </div>

        <div class="lg:col-span-8">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <div id="calendar"></div>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = 'https://ktfiockexdvjuduhqixh.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0ZmlvY2tleGR2anVkdWhxaXhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNjExMjUsImV4cCI6MjA4OTkzNzEyNX0.w_2YABA_lVGrtFukbcpPsZCyeRCGr8iO0U8gjTRbXB8';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        let calendar;
        let categoriesList = [];

        async function init() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) return window.location.href = "index.html";
            
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date-from').value = today;
            document.getElementById('date-to').value = today;

            setupCalendar();
            await loadCategories();
            await loadTodos();
        }

        function setupCalendar() {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth',
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek' },
                height: 'auto',
                eventDisplay: 'block'
            });
            calendar.render();
        }

        async function loadCategories() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const { data } = await supabaseClient.from('categories').select('*').eq('user_id', user.id);
            categoriesList = data || [];
            const select = document.getElementById('category-select');
            const tags = document.getElementById('category-tags');
            select.innerHTML = '<option value="General">🔘 General Flag</option>';
            tags.innerHTML = "";
            categoriesList.forEach(cat => {
                select.innerHTML += `<option value="${cat.name}">${cat.name}</option>`;
                tags.innerHTML += `<span class="px-2 py-1 rounded-lg text-[10px] font-black text-white flex items-center gap-2" style="background: ${cat.color}">${cat.name.toUpperCase()} <button onclick="deleteCategory('${cat.id}')">×</button></span>`;
            });
        }

        async function createCategory() {
            const name = document.getElementById('new-cat-name').value;
            const color = document.getElementById('new-cat-color').value;
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!name) return;
            await supabaseClient.from('categories').insert([{ name, color, user_id: user.id }]);
            document.getElementById('new-cat-name').value = "";
            loadCategories();
        }

        async function loadTodos() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const { data: todos } = await supabaseClient.from('todos').select('*').eq('user_id', user.id).order('date_from', { ascending: true });
            renderUI(todos || []);
        }

        function renderUI(todos) {
            const list = document.getElementById('todo-list');
            list.innerHTML = "";
            calendar.removeAllEvents();

            todos.forEach(todo => {
                const catInfo = categoriesList.find(c => c.name === todo.category) || { color: '#2563eb' };
                const isDone = todo.is_completed;
                const li = document.createElement('li');
                li.className = "task-item p-4 rounded-2xl border bg-white flex justify-between items-center border-slate-100 shadow-sm";
                li.setAttribute('data-task', todo.task.toLowerCase());
                
                // DISPLAYING THE TIME IN THE LIST UI
                li.innerHTML = `
                    <div class="flex items-center gap-3">
                        <input type="checkbox" ${isDone ? 'checked' : ''} onchange="toggleStatus('${todo.id}', ${isDone})" class="w-4 h-4">
                        <div class="${isDone ? 'completed-task' : ''}">
                            <div class="flex items-center gap-2">
                                <span class="category-dot" style="background: ${catInfo.color}"></span>
                                <p class="text-sm font-bold text-slate-700">${todo.task}</p>
                            </div>
                            <p class="text-[9px] text-blue-500 font-bold uppercase tracking-tighter">
                                ${todo.date_from} to ${todo.date_to} | ${todo.start_time || '--'} - ${todo.end_time || '--'}
                            </p>
                        </div>
                    </div>
                    <button onclick="deleteTask('${todo.id}')" class="text-slate-300 hover:text-red-500">✕</button>`;
                list.appendChild(li);

                let endDate = new Date(todo.date_to);
                endDate.setDate(endDate.getDate() + 1);
                calendar.addEvent({
                    title: `[${todo.category}] ${todo.task} (${todo.start_time || ''})`,
                    start: todo.date_from,
                    end: endDate.toISOString().split('T')[0],
                    backgroundColor: isDone ? '#cbd5e1' : catInfo.color,
                    allDay: true
                });
            });
        }

        async function addTodo() {
            const task = document.getElementById('todo-input').value;
            const category = document.getElementById('category-select').value;
            const dFrom = document.getElementById('date-from').value;
            const dTo = document.getElementById('date-to').value;
            const tStart = document.getElementById('start-time').value;
            const tEnd = document.getElementById('end-time').value;
            const { data: { user } } = await supabaseClient.auth.getUser();

            if (!task) return alert("Task required");

            await supabaseClient.from('todos').insert([{ 
                task, category, date_from: dFrom, date_to: dTo, 
                start_time: tStart || null, end_time: tEnd || null,
                user_id: user.id, is_completed: false 
            }]);
            
            document.getElementById('todo-input').value = "";
            loadTodos();
        }

        function filterTasks() {
            const q = document.getElementById('search-bar').value.toLowerCase();
            document.querySelectorAll('.task-item').forEach(i => {
                i.style.display = i.getAttribute('data-task').includes(q) ? 'flex' : 'none';
            });
        }

        async function toggleStatus(id, current) {
            await supabaseClient.from('todos').update({ is_completed: !current }).eq('id', id);
            loadTodos();
        }

        async function deleteTask(id) {
            if (confirm("Delete task?")) { await supabaseClient.from('todos').delete().eq('id', id); loadTodos(); }
        }

        async function deleteCategory(id) {
            await supabaseClient.from('categories').delete().eq('id', id);
            loadCategories(); loadTodos();
        }

        async function handleLogout() { await supabaseClient.auth.signOut(); window.location.href = "index.html"; }
        init();
    </script>
</body>
</html>
