<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | My Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <style>
        .completed-task { text-decoration: line-through; opacity: 0.5; font-style: italic; }
        .fc-event { cursor: pointer; padding: 2px 5px; border-radius: 4px; font-size: 0.85em; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">T</div>
            <h1 class="text-xl font-bold text-slate-800">TaskFlow</h1>
        </div>
        <div class="flex items-center gap-4">
            <span id="user-display" class="text-slate-500 text-sm font-medium"></span>
            <button onclick="handleLogout()" class="text-sm font-bold text-red-500 hover:bg-red-50 px-3 py-2 rounded-lg transition">Logout</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-4 space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="font-bold text-slate-700 mb-4">Add New Task</h2>
                <div class="space-y-4">
                    <input type="text" id="todo-input" placeholder="Task name..." class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase">Start</label>
                            <input type="time" id="start-time" class="w-full p-2 bg-slate-50 border rounded-lg text-sm">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase">End</label>
                            <input type="time" id="end-time" class="w-full p-2 bg-slate-50 border rounded-lg text-sm">
                        </div>
                    </div>
                    
                    <button onclick="addTodo()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-100 transition active:scale-95">Add Task</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="font-bold text-slate-700 mb-4">Task List</h2>
                <ul id="todo-list" class="space-y-3"></ul>
            </div>
        </div>

        <div class="lg:col-span-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 min-h-[500px]">
                <div id="calendar"></div>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = 'https://ktfiockexdvjuduhqixh.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0ZmlvY2tleGR2anVkdWhxaXhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNjExMjUsImV4cCI6MjA4OTkzNzEyNX0.w_2YABA_lVGrtFukbcpPsZCyeRCGr8iO0U8gjTRbXB8';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        let calendar;

        async function checkUser() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) {
                window.location.href = "index.html";
            } else {
                document.getElementById('user-display').innerText = user.user_metadata.full_name || user.email;
                initCalendar();
                loadTodos();
            }
        }

        function initCalendar() {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth',
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek' },
                height: 'auto'
            });
            calendar.render();
        }

        async function loadTodos() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const { data: todos, error } = await supabaseClient.from('todos')
                .select('*').eq('user_id', user.id).order('created_at', { ascending: false });

            if (error) console.error("Load Error:", error);
            else {
                renderTodos(todos);
                syncCalendar(todos);
            }
        }

        function renderTodos(todos) {
            const list = document.getElementById('todo-list');
            list.innerHTML = "";
            if (todos.length === 0) list.innerHTML = `<p class="text-slate-400 text-center text-sm">No tasks found.</p>`;
            
            todos.forEach(todo => {
                const li = document.createElement('li');
                const isDone = todo.is_completed;
                li.className = `flex items-center justify-between p-4 rounded-xl border transition ${isDone ? 'bg-slate-50 border-slate-200' : 'bg-white border-slate-100 shadow-sm'}`;
                
                li.innerHTML = `
                    <div class="flex items-center gap-3">
                        <input type="checkbox" ${isDone ? 'checked' : ''} onchange="toggleComplete('${todo.id}', ${isDone})" class="w-4 h-4 cursor-pointer">
                        <div class="${isDone ? 'completed-task text-slate-400' : 'text-slate-700'}">
                            <p class="text-sm font-semibold">${todo.task}</p>
                            <p class="text-[10px] text-blue-500 font-bold uppercase">${todo.start_time || ''} - ${todo.end_time || ''}</p>
                        </div>
                    </div>
                    <button onclick="deleteTodo('${todo.id}')" class="text-slate-300 hover:text-red-500 transition">✕</button>
                `;
                list.appendChild(li);
            });
        }

        async function addTodo() {
            const taskVal = document.getElementById('todo-input').value;
            const startVal = document.getElementById('start-time').value;
            const endVal = document.getElementById('end-time').value;
            const { data: { user } } = await supabaseClient.auth.getUser();

            if (!taskVal.trim()) return alert("Please type a task name!");

            // Attempt to insert
            const { error } = await supabaseClient.from('todos').insert([{ 
                task: taskVal, 
                start_time: startVal || null, 
                end_time: endVal || null, 
                user_id: user.id, 
                is_completed: false 
            }]);

            if (error) {
                console.error("Database Insert Error:", error);
                alert("Database Error: " + error.message);
            } else {
                document.getElementById('todo-input').value = "";
                loadTodos();
            }
        }

        async function toggleComplete(id, currentStatus) {
            const { error } = await supabaseClient.from('todos').update({ is_completed: !currentStatus }).eq('id', id);
            if (error) alert(error.message);
            else loadTodos();
        }

        async function deleteTodo(id) {
            const { error } = await supabaseClient.from('todos').delete().eq('id', id);
            if (error) alert(error.message);
            else loadTodos();
        }

        function syncCalendar(todos) {
            calendar.removeAllEvents();
            todos.forEach(todo => {
                calendar.addEvent({
                    title: todo.task,
                    start: todo.created_at,
                    backgroundColor: todo.is_completed ? '#e2e8f0' : '#2563eb',
                    borderColor: todo.is_completed ? '#cbd5e1' : '#1d4ed8',
                    textColor: todo.is_completed ? '#94a3b8' : '#ffffff'
                });
            });
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            window.location.href = "index.html";
        }

        checkUser();
    </script>
</body>
</html>
