<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | My Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
</head>
<body class="bg-slate-100 min-h-screen">

    <nav class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-10">
        <h1 class="text-2xl font-bold text-blue-600">TaskFlow</h1>
        <div class="flex items-center gap-4">
            <span id="user-display" class="text-slate-600 font-medium hidden md:block"></span>
            <button onclick="handleLogout()" class="bg-red-50 text-red-600 px-4 py-2 rounded-lg font-semibold hover:bg-red-100 transition">Logout</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-1 space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-xl font-bold text-slate-800 mb-4">Add New Task</h2>
                <div class="flex flex-col gap-3">
                    <input type="text" id="todo-input" placeholder="Task description..." class="p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    <button onclick="addTodo()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition shadow-lg shadow-blue-100">+ Add Task</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-xl font-bold text-slate-800 mb-4">My Tasks</h2>
                <ul id="todo-list" class="space-y-3">
                    </ul>
            </div>
        </div>

        <div class="lg:col-span-2">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 min-h-[600px]">
                <div id="calendar"></div>
            </div>
        </div>

    </main>

    <script>
        const SB_URL = 'https://ktfiockexdvjuduhqixh.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0ZmlvY2tleGR2anVkdWhxaXhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNjExMjUsImV4cCI6MjA4OTkzNzEyNX0.w_2YABA_lVGrtFukbcpPsZCyeRCGr8iO0U8gjTRbXB8';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        let calendar;

        // --- 1. SESSION CHECK ---
        async function checkUser() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) {
                window.location.href = "index.html";
            } else {
                const name = user.user_metadata.full_name || "User";
                document.getElementById('user-display').innerText = "Hello, " + name;
                initCalendar();
                loadTodos();
            }
        }

        // --- 2. CALENDAR SETUP ---
        function initCalendar() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek'
                },
                themeSystem: 'standard',
                height: 'auto'
            });
            calendar.render();
        }

        // --- 3. TASK LOGIC ---
        async function loadTodos() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const { data: todos, error } = await supabaseClient.from('todos')
                .select('*').eq('user_id', user.id).order('created_at', { ascending: false });

            if (!error) {
                renderTodos(todos);
                syncCalendar(todos);
            }
        }

        function renderTodos(todos) {
            const list = document.getElementById('todo-list');
            list.innerHTML = todos.length === 0 ? `<p class="text-slate-400 text-sm italic">No tasks yet.</p>` : "";
            
            todos.forEach(todo => {
                const li = document.createElement('li');
                li.className = "flex justify-between items-center p-4 bg-slate-50 rounded-xl border border-slate-100 hover:border-blue-200 transition group";
                li.innerHTML = `
                    <span class="text-slate-700 font-medium">${todo.task}</span>
                    <button onclick="deleteTodo('${todo.id}')" class="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition">✕</button>
                `;
                list.appendChild(li);
            });
        }

        async function addTodo() {
            const input = document.getElementById('todo-input');
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!input.value.trim()) return;

            const { error } = await supabaseClient.from('todos').insert([{ 
                task: input.value, 
                user_id: user.id 
            }]);

            if (error) alert(error.message);
            else {
                input.value = "";
                loadTodos();
            }
        }

        async function deleteTodo(id) {
            await supabaseClient.from('todos').delete().eq('id', id);
            loadTodos();
        }

        function syncCalendar(todos) {
            calendar.removeAllEvents();
            todos.forEach(todo => {
                calendar.addEvent({
                    title: todo.task,
                    start: todo.created_at,
                    allDay: true,
                    backgroundColor: '#2563eb', // Blue-600
                    borderColor: '#2563eb'
                });
            });
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            window.location.href = "index.html";
        }

        checkUser();
    </script>
</body>
</html>
