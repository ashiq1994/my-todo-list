<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #4f46e5; --glass: rgba(255, 255, 255, 0.85); }
        body { background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%); min-height: 100vh; }
        
        /* Pro Glassmorphism UI */
        .pro-card { 
            background: var(--glass); backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.5); 
            border-radius: 28px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
            transition: transform 0.2s ease;
        }

        /* FIXED CALENDAR GEOMETRY */
        .fc .fc-daygrid-day-frame { 
            min-height: 110px !important; 
            max-height: 110px !important; 
            overflow: hidden; 
        }
        
        /* Slim Task Bars for Professional Look */
        .fc-event { 
            margin: 1px 3px !important; padding: 2px 6px !important; 
            font-size: 0.72rem !important; border-radius: 6px !important; 
            border: none !important; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            font-weight: 600 !important;
        }

        .fc-daygrid-more-link { font-size: 10px !important; font-weight: 800 !important; color: var(--primary) !important; }
        .completed-task { text-decoration: line-through; opacity: 0.4; filter: grayscale(1); }
        .progress-fill { transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1); }
        canvas { max-height: 150px !important; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-6 text-slate-800 font-sans">

    <nav class="max-w-7xl mx-auto mb-8 flex justify-between items-center px-4">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-xl shadow-indigo-200">
                <span class="font-black text-2xl italic">T</span>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-tight">TaskFlow <span class="text-indigo-600 font-black tracking-tighter">PRO</span></h1>
                <p id="user-display" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest"></p>
            </div>
        </div>
        <button onclick="handleLogout()" class="bg-white/60 hover:bg-red-50 text-slate-600 hover:text-red-600 px-6 py-2.5 rounded-2xl text-sm font-bold transition-all border border-white">Logout</button>
    </nav>

    <main class="max-w-7xl mx-auto space-y-6">

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="pro-card p-6 lg:col-span-3">
                <div class="flex justify-between items-end mb-4">
                    <div>
                        <h2 class="text-[10px] font-black uppercase text-slate-400 tracking-widest italic">Success Rate</h2>
                        <p id="progress-text" class="text-4xl font-black text-slate-900">0%</p>
                    </div>
                    <p id="task-count-text" class="text-xs font-bold text-slate-500 bg-white/50 px-3 py-1 rounded-full">0 / 0 Tasks Finished</p>
                </div>
                <div class="w-full h-4 bg-slate-200/50 rounded-full overflow-hidden">
                    <div id="progress-bar" class="progress-fill h-full bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 w-0"></div>
                </div>
            </div>
            <div class="pro-card p-6 flex flex-col justify-center items-center text-center">
                <h2 class="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-1 italic">Efficiency Rank</h2>
                <p id="rank-text" class="text-2xl font-black text-indigo-600 uppercase tracking-tighter">Standby</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-4 space-y-6">
                
                <div class="pro-card p-6">
                    <h2 class="text-[10px] font-black uppercase text-slate-400 mb-4 tracking-widest italic">Flag Management</h2>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="new-cat-name" placeholder="Flag Name..." class="flex-1 p-3 bg-white/50 border border-slate-200 rounded-2xl text-sm outline-none focus:border-indigo-500">
                        <input type="color" id="new-cat-color" value="#4f46e5" class="w-12 h-12 p-1.5 bg-white border border-slate-200 rounded-2xl cursor-pointer">
                        <button onclick="createCategory()" class="bg-slate-900 text-white px-5 rounded-2xl font-bold hover:bg-indigo-600 transition-all shadow-lg">+</button>
                    </div>
                    <div id="category-tags" class="flex flex-wrap gap-2"></div>
                </div>

                <div class="pro-card p-6">
                    <h2 class="text-[10px] font-black uppercase text-slate-400 mb-4 tracking-widest italic">New Schedule</h2>
                    <div class="space-y-4">
                        <input type="text" id="todo-input" placeholder="What needs to be done?" class="w-full p-4 bg-white/50 border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-indigo-500/10 font-semibold text-slate-700">
                        <select id="category-select" class="w-full p-3 bg-white/50 border border-slate-200 rounded-2xl text-sm font-bold text-slate-600 outline-none cursor-pointer"></select>
                        <div class="grid grid-cols-2 gap-3">
                            <input type="date" id="date-from" class="w-full p-2.5 bg-white border border-slate-200 rounded-xl text-xs font-bold">
                            <input type="date" id="date-to" class="w-full p-2.5 bg-white border border-slate-200 rounded-xl text-xs font-bold">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <input type="time" id="start-time" class="w-full p-2.5 bg-white border border-slate-200 rounded-xl text-xs font-bold">
                            <input type="time" id="end-time" class="w-full p-2.5 bg-white border border-slate-200 rounded-xl text-xs font-bold">
                        </div>
                        <button onclick="addTodo()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-xl shadow-indigo-100 hover:scale-[1.02] active:scale-95 transition-all uppercase tracking-widest text-sm">Deploy Task</button>
                    </div>
                </div>

                <div class="pro-card p-6">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-[10px] font-black uppercase text-slate-400 tracking-widest italic">Daily Feed</h2>
                        <input type="text" id="search-bar" onkeyup="filterTasks()" placeholder="Search..." class="p-2 text-xs bg-white border border-slate-200 rounded-xl w-1/2 outline-none">
                    </div>
                    <ul id="todo-list" class="space-y-3 max-h-[300px] overflow-y-auto pr-2"></ul>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="pro-card p-6">
                        <h2 class="text-[10px] font-black uppercase text-slate-400 mb-6 text-center italic">Success Ratio</h2>
                        <canvas id="statusChart"></canvas>
                    </div>
                    <div class="pro-card p-6">
                        <h2 class="text-[10px] font-black uppercase text-slate-400 mb-6 text-center italic">Flag Intensity</h2>
                        <canvas id="categoryChart"></canvas>
                    </div>
                </div>

                <div class="pro-card p-8">
                    <div id="calendar" class="min-h-[550px]"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = 'https://ktfiockexdvjuduhqixh.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0ZmlvY2tleGR2anVkdWhxaXhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNjExMjUsImV4cCI6MjA4OTkzNzEyNX0.w_2YABA_lVGrtFukbcpPsZCyeRCGr8iO0U8gjTRbXB8';
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
        let calendar, statusChart, categoryChart;
        let categoriesList = [];

        async function init() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) return window.location.href = "index.html";
            document.getElementById('user-display').innerText = user.email;
            
            resetForm(); 
            setupCalendar();
            await loadCategories();
            await loadTodos();
        }

        function resetForm() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('todo-input').value = "";
            document.getElementById('date-from').value = today;
            document.getElementById('date-to').value = today;
            document.getElementById('start-time').value = "";
            document.getElementById('end-time').value = "";
            document.getElementById('category-select').selectedIndex = 0;
        }

        function setupCalendar() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek' },
                height: 600,
                dayMaxEvents: 2, 
                eventDisplay: 'block',
                expandRows: true,
                handleWindowResize: true
            });
            calendar.render();
        }

        async function loadCategories() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const { data } = await supabaseClient.from('categories').select('*').eq('user_id', user.id);
            categoriesList = data || [];
            const select = document.getElementById('category-select');
            const tags = document.getElementById('category-tags');
            select.innerHTML = '<option value="General">🔘 General Flag</option>';
            tags.innerHTML = "";
            categoriesList.forEach(cat => {
                select.innerHTML += `<option value="${cat.name}">${cat.name}</option>`;
                tags.innerHTML += `<span class="px-3 py-1.5 rounded-xl text-[9px] font-black text-white flex items-center gap-2 shadow-sm" style="background: ${cat.color}">${cat.name.toUpperCase()} <button onclick="deleteCategory('${cat.id}')">×</button></span>`;
            });
        }

        async function loadTodos() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const { data: todos } = await supabaseClient.from('todos').select('*').eq('user_id', user.id).order('date_from', { ascending: true });
            renderUI(todos || []);
            updateAnalytics(todos || []);
        }

        function updateAnalytics(todos) {
            const completed = todos.filter(t => t.is_completed).length;
            const total = todos.length;
            const percentage = total > 0 ? Math.round((completed / total) * 100) : 0;

            document.getElementById('progress-bar').style.width = `${percentage}%`;
            document.getElementById('progress-text').innerText = `${percentage}%`;
            document.getElementById('task-count-text').innerText = `${completed} / ${total} Finished`;
            
            const rank = percentage === 100 ? "Elite" : percentage > 75 ? "High Efficiency" : "Active";
            document.getElementById('rank-text').innerText = total > 0 ? rank : "Ready";

            if (statusChart) statusChart.destroy();
            statusChart = new Chart(document.getElementById('statusChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Success', 'Pending'],
                    datasets: [{ data: [completed, total - completed], backgroundColor: ['#6366f1', '#f1f5f9'], borderWidth: 0 }]
                },
                options: { cutout: '80%', plugins: { legend: { position: 'bottom' } } }
            });

            const catCounts = {};
            todos.forEach(t => catCounts[t.category] = (catCounts[t.category] || 0) + 1);
            if (categoryChart) categoryChart.destroy();
            categoryChart = new Chart(document.getElementById('categoryChart'), {
                type: 'bar',
                data: {
                    labels: Object.keys(catCounts),
                    datasets: [{ label: 'Intensity', data: Object.values(catCounts), backgroundColor: '#4f46e5', borderRadius: 8 }]
                },
                options: { scales: { y: { display: false }, x: { grid: { display: false } } }, plugins: { legend: { display: false } } }
            });
        }

        function renderUI(todos) {
            const list = document.getElementById('todo-list');
            list.innerHTML = "";
            calendar.removeAllEvents();
            todos.forEach(todo => {
                const catInfo = categoriesList.find(c => c.name === todo.category) || { color: '#6366f1' };
                const isDone = todo.is_completed;
                const li = document.createElement('li');
                li.className = "task-item p-4 rounded-2xl border border-white bg-white/40 flex justify-between items-center shadow-sm hover:bg-white/60 transition-all";
                li.setAttribute('data-task', todo.task.toLowerCase());
                li.innerHTML = `
                    <div class="flex items-center gap-4">
                        <input type="checkbox" ${isDone ? 'checked' : ''} onchange="toggleStatus('${todo.id}', ${isDone})" class="w-5 h-5 cursor-pointer accent-indigo-600">
                        <div class="${isDone ? 'completed-task' : ''}">
                            <div class="flex items-center gap-2">
                                <span class="w-2 h-2 rounded-full" style="background: ${catInfo.color}"></span>
                                <p class="text-sm font-bold text-slate-700">${todo.task}</p>
                            </div>
                            <p class="text-[9px] text-indigo-500 font-black uppercase tracking-widest">${todo.date_from} • ${todo.start_time || '--'}</p>
                        </div>
                    </div>
                    <button onclick="deleteTask('${todo.id}')" class="text-slate-300 hover:text-red-500">✕</button>`;
                list.appendChild(li);

                let endDate = new Date(todo.date_to);
                endDate.setDate(endDate.getDate() + 1);
                calendar.addEvent({
                    title: `[${todo.category}] ${todo.task}`,
                    start: todo.date_from, end: endDate.toISOString().split('T')[0],
                    backgroundColor: isDone ? '#e2e8f0' : catInfo.color,
                    textColor: isDone ? '#94a3b8' : '#ffffff'
                });
            });
        }

        async function addTodo() {
            const task = document.getElementById('todo-input').value;
            const category = document.getElementById('category-select').value;
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!task) return;

            const { error } = await supabaseClient.from('todos').insert([{ 
                task, category, user_id: user.id, is_completed: false,
                date_from: document.getElementById('date-from').value,
                date_to: document.getElementById('date-to').value,
                start_time: document.getElementById('start-time').value || null,
                end_time: document.getElementById('end-time').value || null
            }]);
            if (!error) { resetForm(); loadTodos(); }
        }

        async function toggleStatus(id, current) {
            await supabaseClient.from('todos').update({ is_completed: !current }).eq('id', id);
            loadTodos();
        }

        async function deleteTask(id) {
            if (confirm("Delete this entry?")) { await supabaseClient.from('todos').delete().eq('id', id); loadTodos(); }
        }

        async function createCategory() {
            const name = document.getElementById('new-cat-name').value.trim();
            const color = document.getElementById('new-cat-color').value;
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (name) {
                await supabaseClient.from('categories').insert([{ name, color, user_id: user.id }]);
                document.getElementById('new-cat-name').value = "";
                loadCategories();
            }
        }

        async function deleteCategory(id) {
            await supabaseClient.from('categories').delete().eq('id', id);
            loadCategories(); loadTodos();
        }

        function filterTasks() {
            const q = document.getElementById('search-bar').value.toLowerCase();
            document.querySelectorAll('.task-item').forEach(i => {
                i.style.display = i.getAttribute('data-task').includes(q) ? 'flex' : 'none';
            });
        }

        async function handleLogout() { await supabaseClient.auth.signOut(); window.location.href = "index.html"; }
        init();
    </script>
</body>
</html>
